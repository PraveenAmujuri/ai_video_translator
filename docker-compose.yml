version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echox-backend-api
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
      - ./backend/hls:/app/hls

  nginx:
    image: nginx:alpine
    container_name: echox-nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"  
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Shared structural paths so Nginx can access Certbot tokens and certificates
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot:latest
    container_name: echox-certbot-ssl
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Automatically tracks renewal state variables every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"