version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echox-backend-api
    restart: always
    env_file:
      - .env
    volumes:
      # Persistent storage mappings: Data survives container rebuilds completely
      - ./backend/translator.db:/app/translator.db
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
      - ./backend/hls:/app/hls

  nginx:
    image: nginx:alpine
    container_name: echox-nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api