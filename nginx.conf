events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 500M; # Allows large video uploads
    proxy_read_timeout 600s;   # Prevents Nginx from cutting off Whisper mid-transcription
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS Headers for your Vercel Frontend
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type,Origin,Authorization' always;

            # Handle preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }
}